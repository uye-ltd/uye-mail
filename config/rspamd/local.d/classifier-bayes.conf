# =============================================================================
# Rspamd — Bayesian classifier settings
# =============================================================================

# Automatically learn from messages that score very high (spam) or very low (ham)
autolearn = true;

# Score above which a message is auto-learned as spam
autolearn_spam_threshold = 10.0;

# Score below which a message is auto-learned as ham
autolearn_ham_threshold = -0.5;

# Minimum number of tokens required before Bayes makes a classification
min_tokens = 11;

# Use per-user Bayes statistics (requires Rspamd Redis — disabled by default)
# per_user = true;
