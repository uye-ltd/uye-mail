# =============================================================================
# Rspamd — spam action thresholds
# Placed at /tmp/docker-mailserver/rspamd/local.d/actions.conf by DMS.
# Tune these based on observed false-positive/negative rates.
# =============================================================================

actions {
    # Score at which Rspamd rejects the message outright
    reject = 15.0;

    # Score at which Rspamd adds spam headers AND moves to Junk
    # (MOVE_SPAM_TO_JUNK=1 in DMS handles the Junk folder delivery)
    add_header = 6.0;

    # Score at which Rspamd rewrites the Subject line with [SPAM]
    rewrite_subject = 8.0;

    # Score at which Rspamd requests greylisting (if enabled)
    greylist = 4.0;
}
